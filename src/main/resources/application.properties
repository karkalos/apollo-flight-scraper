spring.application.name=gcp-spring-boot-template
server.port=${PORT:8080}
server.forward-headers-strategy=framework

# Cloud SQL Configuration
spring.cloud.gcp.sql.database-name=${CLOUD_SQL_DATABASE_NAME:sample_db}
spring.cloud.gcp.sql.instance-connection-name=${CLOUD_SQL_CONNECTION_NAME:proven-country-479800-f7:europe-west2:sample-db-instance}

# Database Credentials
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:password123}

# Connection Pool settings
spring.datasource.hikari.maximum-pool-size=2

# Hibernate/JPA settings
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# SQL Script initialization
spring.sql.init.mode=never

# Swagger UI Configuration
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

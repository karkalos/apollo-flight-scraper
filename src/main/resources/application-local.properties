# Local development settings — H2 file-based database
spring.datasource.url=jdbc:h2:file:./data/apollo-flights;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Disable Cloud SQL in local profile
spring.cloud.gcp.sql.enabled=false

# H2 Console for debugging
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA settings for local dev
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# Flyway for local development
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# SQL Script initialization
spring.sql.init.mode=never

# Local scraper overrides
apollo.scraper.chrome.headless=true
apollo.scraper.debug.dump-page-source=true
apollo.scraper.scheduling.enabled=false
apollo.scraper.timeout.page-load=60
apollo.scraper.timeout.flight-cards=30
